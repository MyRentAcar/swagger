type: object
description: |
  Snapshot of a single baseâ†’quote currency rate (mirrors a row of
  `currency_rates`, see `docs/16-multi-currency-design.md` Â§3.2).
required:
  - base_currency
  - quote_currency
  - rate
  - source
  - fetched_at
properties:
  base_currency:
    type: string
    pattern: ^[A-Z]{3}$
    description: Base currency (typically `TRY`).
    example: TRY
  quote_currency:
    type: string
    pattern: ^[A-Z]{3}$
    example: USD
  rate:
    type: string
    pattern: ^\d+(\.\d{1,8})?$
    description: 1 base = `rate` quote.
    example: "32.4523"
  inverse_rate:
    type: string
    pattern: ^\d+(\.\d{1,8})?$
    description: Convenience field, equal to `1/rate`.
    example: "0.03081"
  source:
    type: string
    enum:
      - tcmb
      - ecb
      - fixer
      - openexchangerates
      - manual
    example: tcmb
  fetched_at:
    type: string
    format: date-time
    example: 2026-04-28T13:30:00Z
  valid_from:
    type: string
    format: date-time
    example: 2026-04-28T13:30:00Z
  valid_until:
    type: [string, "null"]
    format: date-time
    description: Null on the currently active rate.
    example: null
