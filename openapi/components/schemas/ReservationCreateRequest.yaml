type: object
description: |
  Request body for `POST /reservations`. The server recomputes the
  pricing quote from `vehicle_id` + window + locations on accept; if
  the recomputed total differs from the offer the customer last saw
  the response is `409 Conflict` and the client must re-quote.
  `Idempotency-Key` header is required.
required:
  - vehicle_id
  - pickup_at
  - dropoff_at
  - pickup_location_id
  - customer
properties:
  vehicle_id:
    type: integer
    format: int64
    example: 42
  pickup_at:
    type: string
    format: date-time
    example: 2026-05-10T10:00:00Z
  dropoff_at:
    type: string
    format: date-time
    example: 2026-05-13T10:00:00Z
  pickup_location_id:
    type: integer
    format: int64
    example: 10
  dropoff_location_id:
    type: [integer, "null"]
    format: int64
    description: |
      Optional drop-off location. When omitted the reservation is
      same-location drop-off (`pickup_location_id`).
    example: 11
  customer:
    description: |
      Either a full `CustomerInput` payload (the server upserts the
      customer keyed on `(tenant_id, email)`) or a reference to an
      existing customer via `{ "id": <int64> }`. The reference form
      is intended for B2B agencies that maintain their own customer
      catalogue and link existing rows to new reservations; the
      server validates the referenced customer belongs to the
      caller's tenant.
    oneOf:
      - $ref: ./CustomerInput.yaml
      - type: object
        required:
          - id
        properties:
          id:
            type: integer
            format: int64
            example: 4711
        additionalProperties: false
  branch_id:
    type: [integer, "null"]
    format: int64
    description: |
      Optional tenant branch the reservation should be ascribed to.
      When omitted the server derives it from the pickup location's
      branch (or leaves it `null` for tenant-wide). See `Branch`
      schema.
    example: 12
  notes:
    type: [string, "null"]
    maxLength: 1000
  extras:
    type: array
    description: |
      Extras to attach to the reservation at create time. Each item
      references a tenant `extras` catalogue row by `extra_id`; the
      server snapshots `name`, `unit_price` and `currency_code` onto
      the resulting `ReservationExtra` row. Omit or pass an empty
      array for reservations without extras.
    items:
      type: object
      required:
        - extra_id
        - quantity
      additionalProperties: false
      properties:
        extra_id:
          type: integer
          format: int64
          example: 17
        quantity:
          type: integer
          minimum: 1
          example: 1
  drivers:
    type: array
    description: |
      Drivers to attach to the reservation. When omitted the server
      auto-creates a single primary-driver row from `customer`.
      When supplied, exactly one entry must have `is_primary = true`
      and every `customer_id` must belong to the caller's tenant.
    items:
      type: object
      required:
        - customer_id
      additionalProperties: false
      properties:
        customer_id:
          type: integer
          format: int64
          example: 4711
        is_primary:
          type: boolean
          default: false
          example: true
  payment_method:
    type: [string, "null"]
    enum:
      - cash
      - card
      - bank_transfer
      - installment
      - null
    description: |
      Customer-selected payment instrument at reservation time.
      `null` defers the choice to pickup.
    example: card
  discount_amount:
    type: string
    pattern: ^\d+(\.\d{1,4})?$
    default: "0"
    description: |
      Optional discount in the recomputed quote currency. The
      server validates the amount against the tenant's discount
      policy (max % / max absolute) before accepting it.
    example: "0"
  custom_fields:
    type: [object, "null"]
    description: |
      Open-ended JSON bag for tenant-specific metadata (partner
      booking refs, loyalty tags, integration ids, …). Stored as-is
      on `Reservation.custom_fields`.
    additionalProperties: true
    example:
      partner_booking_ref: BK-9921
