type: object
description: |
  Request body for `POST /reservations`. The server recomputes the
  pricing quote from `vehicle_id` + window + locations on accept; if
  the recomputed total differs from the offer the customer last saw
  the response is `409 Conflict` and the client must re-quote.
  `Idempotency-Key` header is required.
required:
  - vehicle_id
  - pickup_at
  - dropoff_at
  - pickup_location_id
  - customer
properties:
  vehicle_id:
    type: integer
    format: int64
    example: 42
  pickup_at:
    type: string
    format: date-time
    example: 2026-05-10T10:00:00Z
  dropoff_at:
    type: string
    format: date-time
    example: 2026-05-13T10:00:00Z
  pickup_location_id:
    type: integer
    format: int64
    example: 10
  dropoff_location_id:
    type: [integer, "null"]
    format: int64
    description: |
      Optional drop-off location. When omitted the reservation is
      same-location drop-off (`pickup_location_id`).
    example: 11
  customer:
    $ref: ./CustomerInput.yaml
  branch_id:
    type: [integer, "null"]
    format: int64
    description: |
      Optional tenant branch the reservation should be ascribed to.
      When omitted the server derives it from the pickup location's
      branch (or leaves it `null` for tenant-wide). See `Branch`
      schema.
    example: 12
  notes:
    type: [string, "null"]
    maxLength: 1000
