type: object
description: |
  Cross-fleet availability query. Returns one offer per vehicle
  template that is bookable for the requested window and route.
required:
  - pickup_at
  - dropoff_at
  - pickup_location_id
properties:
  pickup_at:
    type: string
    format: date-time
    description: Pickup datetime in tenant timezone or UTC (server normalizes).
    example: 2026-05-10T10:00:00Z
  dropoff_at:
    type: string
    format: date-time
    description: Drop-off datetime, must be strictly after `pickup_at`.
    example: 2026-05-13T10:00:00Z
  pickup_location_id:
    type: integer
    format: int64
    example: 10
  dropoff_location_id:
    type: [integer, "null"]
    format: int64
    description: |
      Optional drop-off location. When omitted the search assumes
      same-location drop-off (`pickup_location_id`) and skips the
      drop-fee branch.
    example: 11
  vehicle_class_id:
    type: [integer, "null"]
    format: int64
    description: Optional filter — restrict to a single vehicle class.
    example: 3
  branch_id:
    type: [integer, "null"]
    format: int64
    description: |
      Optional filter — restrict the search to a specific tenant
      branch. When omitted the search spans every branch the caller
      is authorized to see (tenant-wide). See `Branch` schema.
    example: 12
