type: object
description: |
  Cross-fleet availability query. Returns one offer per vehicle type
  that is bookable for the requested window and route.
required:
  - pickup_at
  - dropoff_at
  - pickup_location_id
  - dropoff_location_id
properties:
  pickup_at:
    type: string
    format: date-time
    description: Pickup datetime in tenant timezone or UTC (server normalizes).
    example: 2026-05-10T10:00:00Z
  dropoff_at:
    type: string
    format: date-time
    description: Drop-off datetime, must be strictly after `pickup_at`.
    example: 2026-05-13T10:00:00Z
  pickup_location_id:
    type: integer
    format: int64
    example: 10
  dropoff_location_id:
    type: integer
    format: int64
    example: 11
  vehicle_class_id:
    type: [integer, "null"]
    format: int64
    description: Optional filter - restrict to one class.
    example: 3
  drivers_count:
    type: integer
    minimum: 1
    maximum: 5
    default: 1
    example: 1
  promo_code:
    type: [string, "null"]
    example: SUMMER25
  channel:
    type: string
    enum:
      - web
      - mobile
      - admin
      - b2b
    default: web
