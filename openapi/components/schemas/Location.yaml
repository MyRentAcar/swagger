type: object
description: |
  Pickup or drop-off location (mirrors `locations`,
  `docs/03-database-schema.md` §3.3). Tenant-scoped.
required:
  - id
  - name
  - type
  - city
properties:
  id:
    type: integer
    format: int64
    example: 10
  name:
    type: string
    example: Istanbul Airport (IST)
  code:
    type: [string, "null"]
    example: IST
  type:
    type: string
    enum:
      - office
      - airport
      - hotel
      - partner
      - virtual
    example: airport
  city:
    type: object
    required:
      - id
      - name
      - country_code
    properties:
      id:
        type: integer
        format: int64
        example: 34
      name:
        type: string
        example: Istanbul
      country_code:
        type: string
        pattern: ^[A-Z]{2}$
        example: TR
  address:
    type: [string, "null"]
    example: Tayakadin, 34283 Arnavutkoy/Istanbul
  lat:
    type: [number, "null"]
    format: double
    example: 41.275278
  lng:
    type: [number, "null"]
    format: double
    example: 28.751944
  phone:
    type: [string, "null"]
    example: "+902129999999"
  working_hours:
    type: object
    description: Day-of-week to list of `HH:MM-HH:MM` slots.
    additionalProperties:
      type: array
      items:
        type: string
        pattern: ^\d{2}:\d{2}-\d{2}:\d{2}$
    example:
      mon: ["00:00-23:59"]
      tue: ["00:00-23:59"]
      wed: ["00:00-23:59"]
      thu: ["00:00-23:59"]
      fri: ["00:00-23:59"]
      sat: ["00:00-23:59"]
      sun: ["00:00-23:59"]
  after_hours_pickup_fee:
    $ref: ./Money.yaml
  is_active:
    type: boolean
    default: true
