type: object
description: |
  Internationalised string keyed by BCP 47-style locale tag (`tr_TR`,
  `en_US`, `de_DE`, `ru_RU`, `ar_SA`, …). The set of locales actually
  populated for a given resource is bounded by `tenant.supported_locales`.
  Clients should resolve the value against `Accept-Language`, falling
  back to `tenant.locale_default`.
additionalProperties:
  type: string
example:
  tr_TR: Ekonomik
  en_US: Economy
  de_DE: Economy
