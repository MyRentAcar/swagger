type: object
description: |
  Reservation status transition log entry (mirrors
  `reservation_status_history`, `docs/03-database-schema.md` §10.x).
  Each row records one transition of `Reservation.status`, the
  Backoffice user / partner that triggered it (when known), and an
  optional free-text reason. The first entry on a fresh reservation
  has `from_status = null` (creation event). Status-history CRUD is
  not in the public API — the rows are written server-side as a
  side-effect of the lifecycle endpoints (`POST /reservations`,
  `PATCH /reservations/{reservation_number}/cancel`, …) and the
  Backoffice writes its own DB-direct.
required:
  - to_status
  - changed_at
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    example: 5501
  from_status:
    type: [string, "null"]
    enum:
      - pending
      - confirmed
      - picked_up
      - returned
      - cancelled
      - no_show
      - null
    description: |
      Previous reservation status. `null` on the creation event
      (the row is the first entry in the history).
    example: pending
  to_status:
    type: string
    enum:
      - pending
      - confirmed
      - picked_up
      - returned
      - cancelled
      - no_show
    description: New reservation status after the transition.
    example: confirmed
  changed_by_user_id:
    type: [integer, "null"]
    format: int64
    description: |
      FK to the Backoffice user that triggered the transition.
      `null` when the transition was system-driven (cron, webhook,
      or B2B partner action keyed off the bearer token).
    example: 42
  reason:
    type: [string, "null"]
    maxLength: 500
    description: |
      Optional free-text reason. Populated for cancellations
      (mirrors `Reservation.cancellation_reason`) and for any
      manual override the Backoffice records.
    example: Travel plans changed.
  changed_at:
    type: string
    format: date-time
    readOnly: true
    description: Timestamp of the transition.
    example: 2026-05-09T12:00:00Z
