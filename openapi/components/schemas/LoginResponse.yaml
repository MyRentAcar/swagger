type: object
description: |
  Successful login response. When `requires_2fa` is true, `token` is
  absent and the client must complete `POST /auth/2fa/verify` (out of
  scope of this skeleton) before receiving an access token.
required:
  - requires_2fa
properties:
  user:
    type: object
    required:
      - id
      - email
      - tenant_id
    properties:
      id:
        type: integer
        format: int64
        example: 42
      email:
        type: string
        format: email
        example: user@example.com
      name:
        type: string
        example: Ali Veli
      tenant_id:
        type: integer
        format: int64
        example: 7
      role_type:
        type: string
        enum:
          - super_admin
          - tenant_admin
          - tenant_staff
          - customer
          - api
        example: customer
  token:
    type: string
    description: Sanctum personal access token (`<id>|<plain>`).
    example: 1|aBc123XyZ789...
  expires_at:
    type: string
    format: date-time
    example: 2026-05-28T08:00:00Z
  abilities:
    type: array
    items:
      type: string
    example:
      - vehicle:read
      - reservation:read
      - reservation:write
      - profile:write
  requires_2fa:
    type: boolean
    default: false
  challenge_token:
    type: [string, "null"]
    description: Set when `requires_2fa` is true.
