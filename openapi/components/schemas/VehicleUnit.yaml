type: object
description: |
  Physical vehicle (plate-level), fulfilling a `Vehicle` template.
  Mirrors `vehicle_units` (`docs/03-database-schema.md` §4.5).
  Plate-level data is hidden from public B2C/B2B responses; this schema
  is used by tenant operations admin endpoints and B2B partner
  reservation detail responses where the tenant has opted in. The
  `plate` value is unique within a tenant; `vin` is globally unique
  (ISO 3779 17-character VIN).
required:
  - id
  - vehicle_id
  - plate
  - status
properties:
  id:
    type: integer
    format: int64
    example: 142
  vehicle_id:
    type: integer
    format: int64
    example: 42
  plate:
    type: string
    maxLength: 32
    description: |
      Plate number string. The platform stores it verbatim; for Turkish
      plates the canonical format is `34 ABC 1234` but the field is not
      pattern-restricted to allow non-TR fleets.
    example: 34 ABC 1234
  vin:
    type: [string, "null"]
    minLength: 17
    maxLength: 17
    description: ISO 3779 17-character Vehicle Identification Number; globally unique.
    example: VF15RBL0H67890123
  color:
    type: [string, "null"]
    maxLength: 40
    example: White
  year:
    type: [integer, "null"]
    minimum: 1950
    maximum: 2100
    example: 2024
  current_km:
    type: [integer, "null"]
    minimum: 0
    example: 14523
  purchased_at:
    type: [string, "null"]
    format: date
    example: 2024-03-12
  status:
    type: string
    enum:
      - active
      - maintenance
      - retired
    example: active
  notes:
    type: [string, "null"]
    maxLength: 5000
    description: Free-form operations notes (admin-only surface).
  branch_id:
    type: [integer, "null"]
    format: int64
    description: |
      Tenant branch the unit is currently stationed at. `null` means
      tenant-wide / unassigned (HQ pool). See `Branch` schema.
    example: 12
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
