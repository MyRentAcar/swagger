type: object
description: |
  Customer payload accepted on `POST /reservations`. The server
  upserts a `customers` row keyed by `(tenant_id, email)`; identity
  fields supplied here overwrite previous values for the same key.
  PII fields (`tckn`, `passport_no`, `license_*`, `date_of_birth`)
  are stored encrypted at rest and surfaced masked on read endpoints
  — see `Customer`.
required:
  - email
  - phone
  - first_name
  - last_name
properties:
  email:
    type: string
    format: email
    maxLength: 200
    example: john.doe@example.com
  phone:
    type: string
    description: E.164 phone number.
    pattern: ^\+[1-9]\d{6,14}$
    example: "+905551234567"
  first_name:
    type: string
    minLength: 1
    maxLength: 80
    example: John
  last_name:
    type: string
    minLength: 1
    maxLength: 80
    example: Doe
  tckn:
    type: [string, "null"]
    pattern: ^[1-9]\d{10}$
    description: |
      Türkiye Cumhuriyeti Kimlik Numarası (TCKN) — 11 digits, the
      first digit is non-zero. The regex enforces format only; the
      authoritative checksum is validated server-side:

        - 10th digit: `((d1+d3+d5+d7+d9) * 7 - (d2+d4+d6+d8)) mod 10`
        - 11th digit: `(d1+d2+...+d10) mod 10`

      MerNIS / NVI live verification is deferred to Faz 2 — Sprint
      2.2 ships the algorithmic checksum only. One of `tckn` or
      `passport_no` is typically required by the tenant policy for
      Turkish residents — the server enforces the tenant rule.
    example: null
  passport_no:
    type: [string, "null"]
    minLength: 5
    maxLength: 30
    description: Passport number for non-resident customers.
    example: null
  nationality:
    type: [string, "null"]
    minLength: 2
    maxLength: 2
    pattern: ^[A-Z]{2}$
    description: ISO 3166-1 alpha-2 nationality code.
    example: TR
  date_of_birth:
    type: [string, "null"]
    format: date
    example: 1985-03-15
  license_number:
    type: [string, "null"]
    maxLength: 40
    example: X9876543
  license_issued_at:
    type: [string, "null"]
    format: date
    example: 2010-04-01
  license_expires_at:
    type: [string, "null"]
    format: date
    example: 2030-04-01
  language:
    type: string
    description: |
      Preferred locale for transactional emails / SMS. Falls back to
      `tenant.locale_default` when omitted.
    default: tr_TR
    example: tr_TR
  marketing_consent:
    type: boolean
    default: false
    description: KVKK marketing consent for the current tenant.
  branch_id:
    type: [integer, "null"]
    format: int64
    description: |
      Optional tenant branch the customer is bound to. Omit (or send
      `null`) for a tenant-wide (HQ) record. See `Branch` schema.
    example: 12
  type:
    type: string
    enum:
      - individual
      - corporate
    default: individual
    description: |
      Customer type. Corporate customers are expected to provide
      `tax_id` and `company_name`; the server enforces the
      conditional requirement on write.
    example: individual
  tax_id:
    type: [string, "null"]
    maxLength: 32
    description: Tax registration number for corporate customers (Türkiye VKN — 10 digits).
    example: null
  company_name:
    type: [string, "null"]
    maxLength: 200
    description: Registered company name for corporate customers.
    example: null
  gender:
    type: [string, "null"]
    enum:
      - male
      - female
      - other
      - unspecified
      - null
    description: Self-declared gender. Omit or send `null` to leave unspecified.
    example: null
  license_class:
    type: [string, "null"]
    maxLength: 16
    description: Driver licence class / category (e.g. `B`, `B+CE`, `D`).
    example: B
  license_country:
    type: [string, "null"]
    minLength: 2
    maxLength: 2
    pattern: ^[A-Z]{2}$
    description: ISO 3166-1 alpha-2 country code that issued the driver licence.
    example: TR
  source:
    type: [string, "null"]
    maxLength: 32
    description: |
      Acquisition / channel hint (e.g. `online`, `walk-in`, `b2b`,
      `referral`). Free-form; tenants curate the vocabulary.
    example: online
  addresses:
    type: array
    description: |
      Optional bulk-create of customer addresses on first
      onboarding. Each entry is upserted under the resulting
      customer row. See `CustomerAddressInput`.
    items:
      $ref: ./CustomerAddressInput.yaml
  documents:
    type: array
    description: |
      Optional bulk-create of customer KYC documents on first
      onboarding. Binaries are uploaded to Cloudflare R2 out of
      band; this array carries the resulting object keys plus
      metadata. See `CustomerDocumentInput`.
    items:
      $ref: ./CustomerDocumentInput.yaml
