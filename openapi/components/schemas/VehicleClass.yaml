type: object
description: |
  Marketing class / category for a vehicle (mirrors `vehicle_classes`,
  see `docs/03-database-schema.md` §4.1). Tenant-scoped; the `slug` is
  unique within a tenant. `name` and `description` are emitted as a
  single localized string for the request locale (resolved from
  `Accept-Language`, falling back to `tenant.locale_default`). See
  ADR-018 — translation maps are an internal Backoffice concern and
  are not exposed by the public API.
required:
  - id
  - slug
  - name
  - is_active
properties:
  id:
    type: integer
    format: int64
    example: 3
  slug:
    type: string
    description: Tenant-unique stable identifier (kebab-case).
    example: economy
  name:
    type: string
    description: Localized class name for the current request locale.
    example: Economy
  description:
    type: [string, "null"]
    description: Localized description for the current request locale.
    example: Affordable everyday cars suited to city driving.
  display_order:
    type: integer
    minimum: 0
    default: 0
    description: Sort key on listing pages; lower values surface first.
    example: 10
  is_active:
    type: boolean
    default: true
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
