type: object
description: |
  Marketing class / category for a vehicle (mirrors `vehicle_classes`,
  see `docs/03-database-schema.md` §4.1). Tenant-scoped; the `slug` is
  unique within a tenant. `name` and `description` are i18n maps —
  resolve them against `Accept-Language`.
required:
  - id
  - slug
  - name
  - is_active
properties:
  id:
    type: integer
    format: int64
    example: 3
  slug:
    type: string
    description: Tenant-unique stable identifier (kebab-case).
    example: economy
  name:
    $ref: ./I18nString.yaml
  description:
    oneOf:
      - $ref: ./I18nString.yaml
      - type: 'null'
    description: Optional i18n description.
  display_order:
    type: integer
    minimum: 0
    default: 0
    description: Sort key on listing pages; lower values surface first.
    example: 10
  is_active:
    type: boolean
    default: true
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
