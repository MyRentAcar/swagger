type: object
description: |
  Pricing rule applied to a vehicle, vehicle class or tenant default
  (mirrors `pricing_rules`, `docs/03-database-schema.md` §6.1;
  precedence algorithm in §6.4 — vehicle → class → tenant default,
  then `priority` desc as tie-breaker). The matching engine evaluates
  weekday, location lists and rental duration band before applying the
  rule's daily/weekly/monthly tiers (greedy bucket allocation, see
  `App\\Services\\Pricing\\PricingService`).
required:
  - id
  - name
  - currency
  - is_active
properties:
  id:
    type: integer
    format: int64
    example: 1234
  vehicle_id:
    type: [integer, "null"]
    format: int64
    description: When set, scopes the rule to a specific vehicle template.
    example: 42
  vehicle_class_id:
    type: [integer, "null"]
    format: int64
    description: When set, scopes the rule to a vehicle class. Ignored if `vehicle_id` is also set.
    example: 3
  name:
    type: string
    maxLength: 160
    description: Human-readable label, surfaced in audit/breakdown payloads.
    example: Summer 2026 — Economy default
  priority:
    type: integer
    description: Tie-breaker among rules of equal specificity; higher wins.
    default: 0
    example: 100
  valid_from:
    type: [string, "null"]
    format: date
    description: Inclusive lower bound on the pickup date.
    example: 2026-06-01
  valid_to:
    type: [string, "null"]
    format: date
    description: Inclusive upper bound on the pickup date.
    example: 2026-09-30
  applicable_pickup_locations:
    type: [array, "null"]
    items:
      type: integer
      format: int64
    description: When set, the rule only matches pickups at these locations.
    example: [10, 11]
  applicable_dropoff_locations:
    type: [array, "null"]
    items:
      type: integer
      format: int64
    description: When set, the rule only matches drop-offs at these locations.
    example: [10]
  weekday_mask:
    type: integer
    minimum: 0
    maximum: 127
    default: 127
    description: |
      ISO weekday bitmask (Mon=1, Tue=2, …, Sun=64). The default `127`
      (`0b1111111`) matches every day; `0b0011111` (`31`) matches
      Mon–Fri only.
    example: 127
  min_rental_days:
    type: integer
    minimum: 1
    maximum: 365
    default: 1
    example: 1
  max_rental_days:
    type: [integer, "null"]
    minimum: 1
    maximum: 3650
    description: When null the rule has no upper bound on rental duration.
    example: 30
  daily_rate:
    type: [string, "null"]
    pattern: ^\d+(\.\d{1,4})?$
    description: Decimal daily tier rate in `currency`.
    example: "1450.00"
  weekly_rate:
    type: [string, "null"]
    pattern: ^\d+(\.\d{1,4})?$
    description: Decimal weekly (7-day) tier rate in `currency`.
    example: "9000.00"
  monthly_rate:
    type: [string, "null"]
    pattern: ^\d+(\.\d{1,4})?$
    description: Decimal monthly (28-day) tier rate in `currency`.
    example: "32000.00"
  currency:
    type: string
    minLength: 3
    maxLength: 3
    pattern: ^[A-Z]{3}$
    description: |
      ISO 4217 storage currency. Defaults to `tenant.currency_default`
      at create time when omitted.
    example: TRY
  extras:
    type: [object, "null"]
    description: |
      Free-form configuration bag for tenant-specific extras (insurance,
      child seats, …). The shape is intentionally open and not part of
      the public contract.
    additionalProperties: true
  is_active:
    type: boolean
    default: true
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
