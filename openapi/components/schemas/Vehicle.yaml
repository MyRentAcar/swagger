type: object
description: |
  Vehicle "type" template — the contractual unit of a reservation
  (mirrors `vehicles`, see `docs/03-database-schema.md` §4.4). One
  Vehicle is rented "or similar" and may be fulfilled by any matching
  `VehicleUnit` (plate). Tenant-scoped; the `slug` is unique within a
  tenant. `description` and `features` are emitted as single localized
  strings for the request locale (resolved from `Accept-Language`,
  falling back to `tenant.locale_default`). See ADR-018 — translation
  maps are an internal Backoffice concern and are not exposed by the
  public API.
required:
  - id
  - slug
  - make
  - model
  - year
  - transmission
  - fuel_type
  - seat_count
  - door_count
  - is_active
properties:
  id:
    type: integer
    format: int64
    example: 42
  slug:
    type: string
    description: Tenant-unique stable identifier (kebab-case).
    example: renault-clio-2024
  vehicle_class_id:
    type: [integer, "null"]
    format: int64
    example: 3
  vehicle_class:
    description: Eager-loaded class projection (present on detail/list responses that include the relation).
    oneOf:
      - $ref: ./VehicleClass.yaml
      - type: 'null'
  make:
    type: string
    maxLength: 80
    example: Renault
  model:
    type: string
    maxLength: 100
    example: Clio
  year:
    type: integer
    minimum: 1950
    maximum: 2100
    example: 2024
  transmission:
    type: string
    enum:
      - manual
      - automatic
    example: manual
  fuel_type:
    type: string
    enum:
      - gasoline
      - diesel
      - hybrid
      - electric
      - lpg
    example: diesel
  seat_count:
    type: integer
    minimum: 1
    maximum: 99
    example: 5
  door_count:
    type: integer
    minimum: 1
    maximum: 9
    example: 4
  luggage_capacity:
    type: [integer, "null"]
    minimum: 0
    maximum: 99
    example: 2
  air_conditioning:
    type: boolean
    default: true
  min_driver_age:
    type: [integer, "null"]
    minimum: 18
    maximum: 99
    example: 21
  min_license_years:
    type: [integer, "null"]
    minimum: 0
    maximum: 50
    example: 1
  description:
    type: [string, "null"]
    description: Localized description for the current request locale.
    example: Compact 5-door hatchback, ideal for city driving.
  images:
    type: [array, "null"]
    items:
      type: string
      format: uri
    example:
      - https://cdn.example.com/vehicles/42/1.jpg
      - https://cdn.example.com/vehicles/42/2.jpg
  features:
    type: [string, "null"]
    description: |
      Optional localized feature highlights (bluetooth, cruise control, …)
      for the current request locale.
    example: Bluetooth, cruise control, USB-C, rear camera
  display_order:
    type: integer
    minimum: 0
    default: 0
    example: 10
  is_active:
    type: boolean
    default: true
  is_featured:
    type: boolean
    default: false
  units_count:
    type: [integer, "null"]
    description: |
      Number of `VehicleUnit` rows attached to this vehicle. Hidden by
      default on list endpoints; populated on the admin detail endpoint.
    example: 7
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
