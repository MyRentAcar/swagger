type: object
description: |
  Vehicle "type" template — the contractual unit of a reservation
  (mirrors `vehicles`, see `docs/03-database-schema.md` §4.4). One
  Vehicle is rented "or similar" and may be fulfilled by any matching
  `VehicleUnit` (plate).
required:
  - id
  - tenant_id
  - display_name
  - class
  - transmission
  - fuel_type
  - seats
  - doors
properties:
  id:
    type: integer
    format: int64
    example: 42
  tenant_id:
    type: integer
    format: int64
    example: 7
  display_name:
    type: string
    example: Renault Clio (or similar)
  class:
    $ref: ./VehicleClass.yaml
  brand:
    type: string
    example: Renault
  model:
    type: string
    example: Clio
  transmission:
    type: string
    enum:
      - manual
      - auto
      - semi_auto
    example: manual
  fuel_type:
    type: string
    enum:
      - gasoline
      - diesel
      - lpg
      - hybrid
      - electric
    example: diesel
  seats:
    type: integer
    minimum: 1
    maximum: 50
    example: 5
  doors:
    type: integer
    minimum: 2
    maximum: 6
    example: 4
  luggage_large:
    type: [integer, "null"]
    minimum: 0
    example: 2
  luggage_small:
    type: [integer, "null"]
    minimum: 0
    example: 1
  has_ac:
    type: boolean
    default: true
  min_driver_age:
    type: integer
    example: 21
  min_license_years:
    type: integer
    example: 1
  image_urls:
    type: array
    items:
      type: string
      format: uri
    example:
      - https://cdn.example.com/vehicles/42/1.jpg
      - https://cdn.example.com/vehicles/42/2.jpg
  description:
    type: string
    description: Localized description (resolved against `Accept-Language`).
    example: Compact 5-door hatchback ideal for city driving.
  is_active:
    type: boolean
    default: true
