type: object
description: |
  End-customer (B2C) record returned on owned reservations and on
  `GET /customers/me`. PII fields (`tckn`, `passport_no`,
  `license_number`, `date_of_birth`) are emitted masked â€” only the
  customer themselves and Backoffice (which talks to the database
  directly) see the unmasked values. Sprint 2.2 adds B2B / KYC
  fields (`type`, `tax_id`, `company_name`, `gender`, extended
  driver-licence metadata, `source`) and the embeddable
  `addresses` / `documents` relations (opt-in via `?include=`).
required:
  - id
  - email
  - phone
  - first_name
  - last_name
  - type
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    example: 4711
  email:
    type: string
    format: email
    example: john.doe@example.com
  phone:
    type: string
    description: E.164 phone number.
    pattern: ^\+[1-9]\d{6,14}$
    example: "+905551234567"
  first_name:
    type: string
    minLength: 1
    maxLength: 80
    example: John
  last_name:
    type: string
    minLength: 1
    maxLength: 80
    example: Doe
  tckn_masked:
    type: [string, "null"]
    description: |
      Masked Turkish national ID. Always 11 asterisks
      (`***********`) when the underlying record is set, `null`
      otherwise. The unmasked value is never returned over the API.
    example: "***********"
  passport_no_masked:
    type: [string, "null"]
    description: |
      Masked passport number â€” first and last character preserved,
      the rest replaced with asterisks. `null` when no passport is
      on file.
    example: "X******3"
  nationality:
    type: [string, "null"]
    minLength: 2
    maxLength: 2
    pattern: ^[A-Z]{2}$
    example: TR
  date_of_birth:
    type: [string, "null"]
    format: date
    description: Returned only on `GET /customers/me`; null in all other contexts.
    example: 1985-03-15
  license_number_masked:
    type: [string, "null"]
    description: Masked driver licence number; null when no licence is on file.
    example: "X*****3"
  license_issued_at:
    type: [string, "null"]
    format: date
    example: 2010-04-01
  license_expires_at:
    type: [string, "null"]
    format: date
    example: 2030-04-01
  language:
    type: string
    description: Preferred locale for transactional communications.
    example: tr_TR
  marketing_consent:
    type: boolean
    description: KVKK marketing consent for the current tenant.
    example: false
  kvkk_consent_at:
    type: [string, "null"]
    format: date-time
    description: Timestamp the KVKK consent text was last accepted.
    example: 2026-04-28T10:00:00Z
  branch_id:
    type: [integer, "null"]
    format: int64
    description: |
      Tenant branch the customer record is bound to. `null` means
      tenant-wide (HQ); a value pins ownership to that branch. See
      `Branch` schema.
    example: 12
  type:
    type: string
    enum:
      - individual
      - corporate
    default: individual
    description: |
      Customer type. `individual` is the default B2C row;
      `corporate` flags a B2B / fleet customer for which `tax_id`
      and `company_name` are typically populated.
    example: individual
  tax_id:
    type: [string, "null"]
    maxLength: 32
    description: |
      Tax registration number for corporate customers (TĂĽrkiye:
      VKN, 10 digits). `null` for individual customers.
    example: null
  company_name:
    type: [string, "null"]
    maxLength: 200
    description: Registered company name for corporate customers; `null` otherwise.
    example: null
  gender:
    type: [string, "null"]
    enum:
      - male
      - female
      - other
      - unspecified
      - null
    description: Self-declared gender; `null` when the customer has not provided one.
    example: unspecified
  license_class:
    type: [string, "null"]
    maxLength: 16
    description: |
      Driver licence class / category (e.g. `B`, `B+CE`, `D`).
      Free-form because country systems differ; the Backoffice
      validates per tenant policy.
    example: B
  license_country:
    type: [string, "null"]
    minLength: 2
    maxLength: 2
    pattern: ^[A-Z]{2}$
    description: ISO 3166-1 alpha-2 country code that issued the driver licence.
    example: TR
  source:
    type: [string, "null"]
    maxLength: 32
    description: |
      Acquisition / channel hint for analytics (e.g. `online`,
      `walk-in`, `b2b`, `referral`). Free-form; the Backoffice
      curates the controlled vocabulary per tenant.
    example: online
  addresses:
    type: array
    description: |
      Customer addresses. Embedded only when the request opts in via
      `?include=addresses`; omitted otherwise. See `CustomerAddress`.
    items:
      $ref: ./CustomerAddress.yaml
  documents:
    type: array
    description: |
      Customer KYC documents. Embedded only when the request opts in
      via `?include=documents`; omitted otherwise. See
      `CustomerDocument`.
    items:
      $ref: ./CustomerDocument.yaml
