description: |
  Validation failure. Response body is RFC 7807 Problem Details with an
  `errors` map keyed by request field, following Laravel FormRequest
  conventions. See `docs/08-api-security.md` §10.1.
content:
  application/problem+json:
    schema:
      $ref: ../schemas/ValidationError.yaml
    example:
      type: https://docs.example.com/api/v1/errors/validation
      title: Unprocessable Entity
      status: 422
      detail: The given data was invalid.
      instance: /v1/reservations
      code: validation_failed
      errors:
        pickup_at:
          - The pickup_at field must be a valid ISO 8601 datetime in the future.
        dropoff_at:
          - The dropoff_at field must be after pickup_at.
