description: |
  The resource does not exist, or it belongs to a different tenant
  (cross-tenant access returns 404, never 403, to prevent
  enumeration — see `docs/08-api-security.md` §9.3).
content:
  application/problem+json:
    schema:
      $ref: ../schemas/Error.yaml
    example:
      type: https://docs.example.com/api/v1/errors/not-found
      title: Not Found
      status: 404
      detail: Reservation 123456 was not found.
      instance: /v1/reservations/123456
      code: not_found
