check:
  get:
    operationId: stopSale.check
    summary: Three-level stop-sale availability check
    description: |
      Evaluates the `plate` → `vehicle` → `global` precedence chain
      from `stop_sales` for a given vehicle and date window
      (see `docs/06-stop-sale-design.md` and
      `docs/03-database-schema.md` §5.3). Use this endpoint from the
      storefront for "is this car bookable" pre-flight checks, B2B
      partner integrations, or for debugging
      "why is this car not bookable" tickets.
    tags: [StopSale]
    security:
      - hmacAuth: []
    parameters:
      - $ref: ../components/parameters/XTenantId.yaml
      - $ref: ../components/parameters/XAppId.yaml
      - $ref: ../components/parameters/XTimestamp.yaml
      - $ref: ../components/parameters/XNonce.yaml
      - $ref: ../components/parameters/XSignature.yaml
      - $ref: ../components/parameters/XApiVersion.yaml
      - $ref: ../components/parameters/AcceptLanguage.yaml
      - in: query
        name: vehicle_id
        required: true
        description: Vehicle template id to evaluate.
        schema:
          type: integer
          format: int64
          minimum: 1
      - in: query
        name: from
        required: true
        description: Window start date (inclusive, tenant timezone).
        schema:
          type: string
          format: date
      - in: query
        name: to
        required: true
        description: Window end date (inclusive, tenant timezone).
        schema:
          type: string
          format: date
      - in: query
        name: location_id
        required: false
        description: |
          Optional pickup location. When supplied, restricts the
          check to stop-sales that target this location (or are
          tenant-wide).
        schema:
          type: integer
          format: int64
          minimum: 1
    responses:
      '200':
        description: Check result.
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: ../components/schemas/StopSaleCheckResult.yaml
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
