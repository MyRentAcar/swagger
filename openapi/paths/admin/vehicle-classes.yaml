collection:
  get:
    operationId: admin.vehicleClasses.list
    summary: List vehicle classes (admin)
    description: |
      Paginated list of `vehicle_classes` rows for the active tenant.
      Cursor pagination uses the numeric primary key
      (`?cursor=<last-id>`); the server caps `limit` at 100.
      Authorisation goes through the `VehicleClass` policy
      (`viewAny`).
    tags: [admin-vehicle-classes]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../../components/parameters/XTenantId.yaml
      - $ref: ../../components/parameters/XAppId.yaml
      - $ref: ../../components/parameters/XTimestamp.yaml
      - $ref: ../../components/parameters/XNonce.yaml
      - $ref: ../../components/parameters/XSignature.yaml
      - $ref: ../../components/parameters/XApiVersion.yaml
      - $ref: ../../components/parameters/AcceptLanguage.yaml
      - in: query
        name: cursor
        required: false
        description: Numeric cursor — primary key of the last row of the previous page.
        schema:
          type: integer
          format: int64
          minimum: 1
      - in: query
        name: limit
        required: false
        description: Page size (server-capped at 100).
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - in: query
        name: is_active
        required: false
        description: Filter by active flag.
        schema:
          type: boolean
    responses:
      '200':
        description: Page of vehicle classes.
        content:
          application/json:
            schema:
              type: object
              required: [data, meta]
              properties:
                data:
                  type: array
                  items:
                    $ref: ../../components/schemas/VehicleClass.yaml
                meta:
                  type: object
                  properties:
                    pagination:
                      $ref: ../../components/schemas/PaginationMeta.yaml
      '401':
        $ref: ../../components/responses/Unauthorized.yaml
      '403':
        $ref: ../../components/responses/Forbidden.yaml
      '422':
        $ref: ../../components/responses/UnprocessableEntity.yaml
      '429':
        $ref: ../../components/responses/TooManyRequests.yaml

  post:
    operationId: admin.vehicleClasses.create
    summary: Create a vehicle class (admin)
    description: |
      Creates a `vehicle_classes` row in the active tenant.
      `Idempotency-Key` is recommended — when present, retries with the
      same key replay the cached response (24h window).
    tags: [admin-vehicle-classes]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../../components/parameters/XTenantId.yaml
      - $ref: ../../components/parameters/XAppId.yaml
      - $ref: ../../components/parameters/XTimestamp.yaml
      - $ref: ../../components/parameters/XNonce.yaml
      - $ref: ../../components/parameters/XSignature.yaml
      - $ref: ../../components/parameters/XApiVersion.yaml
      - $ref: ../../components/parameters/AcceptLanguage.yaml
      - $ref: ../../components/parameters/IdempotencyKey.yaml
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [slug, name]
            properties:
              slug:
                type: string
                maxLength: 80
                pattern: ^[a-z0-9][a-z0-9-]{0,78}[a-z0-9]$
              name:
                $ref: ../../components/schemas/I18nString.yaml
              description:
                oneOf:
                  - $ref: ../../components/schemas/I18nString.yaml
                  - type: 'null'
              display_order:
                type: integer
                minimum: 0
                default: 0
              is_active:
                type: boolean
                default: true
    responses:
      '201':
        description: Class created.
        headers:
          Location:
            description: Canonical URI of the newly created resource.
            schema:
              type: string
              format: uri
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: ../../components/schemas/VehicleClass.yaml
      '400':
        $ref: ../../components/responses/BadRequest.yaml
      '401':
        $ref: ../../components/responses/Unauthorized.yaml
      '403':
        $ref: ../../components/responses/Forbidden.yaml
      '422':
        $ref: ../../components/responses/UnprocessableEntity.yaml
      '429':
        $ref: ../../components/responses/TooManyRequests.yaml

byId:
  parameters:
    - $ref: ../../components/parameters/IdParam.yaml
  get:
    operationId: admin.vehicleClasses.show
    summary: Get a vehicle class (admin)
    description: Returns the class. Cross-tenant ids return `404`.
    tags: [admin-vehicle-classes]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../../components/parameters/XTenantId.yaml
      - $ref: ../../components/parameters/XAppId.yaml
      - $ref: ../../components/parameters/XTimestamp.yaml
      - $ref: ../../components/parameters/XNonce.yaml
      - $ref: ../../components/parameters/XSignature.yaml
      - $ref: ../../components/parameters/XApiVersion.yaml
      - $ref: ../../components/parameters/AcceptLanguage.yaml
    responses:
      '200':
        description: Vehicle class detail.
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: ../../components/schemas/VehicleClass.yaml
      '401':
        $ref: ../../components/responses/Unauthorized.yaml
      '403':
        $ref: ../../components/responses/Forbidden.yaml
      '404':
        $ref: ../../components/responses/NotFound.yaml

  put:
    operationId: admin.vehicleClasses.update
    summary: Update a vehicle class (admin)
    description: |
      Replaces the writable fields on a `vehicle_classes` row. The
      payload follows the FormRequest `sometimes` convention — fields
      omitted in the body remain unchanged.
    tags: [admin-vehicle-classes]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../../components/parameters/XTenantId.yaml
      - $ref: ../../components/parameters/XAppId.yaml
      - $ref: ../../components/parameters/XTimestamp.yaml
      - $ref: ../../components/parameters/XNonce.yaml
      - $ref: ../../components/parameters/XSignature.yaml
      - $ref: ../../components/parameters/XApiVersion.yaml
      - $ref: ../../components/parameters/AcceptLanguage.yaml
      - $ref: ../../components/parameters/IdempotencyKey.yaml
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              slug:
                type: string
                maxLength: 80
                pattern: ^[a-z0-9][a-z0-9-]{0,78}[a-z0-9]$
              name:
                $ref: ../../components/schemas/I18nString.yaml
              description:
                oneOf:
                  - $ref: ../../components/schemas/I18nString.yaml
                  - type: 'null'
              display_order:
                type: integer
                minimum: 0
              is_active:
                type: boolean
    responses:
      '200':
        description: Class updated.
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: ../../components/schemas/VehicleClass.yaml
      '400':
        $ref: ../../components/responses/BadRequest.yaml
      '401':
        $ref: ../../components/responses/Unauthorized.yaml
      '403':
        $ref: ../../components/responses/Forbidden.yaml
      '404':
        $ref: ../../components/responses/NotFound.yaml
      '422':
        $ref: ../../components/responses/UnprocessableEntity.yaml

  delete:
    operationId: admin.vehicleClasses.delete
    summary: Delete a vehicle class (admin)
    description: |
      Soft-deletes the class (`deleted_at` timestamp). Vehicles that
      reference the class keep their reference; deletion does not
      cascade. Cross-tenant ids return `404`.
    tags: [admin-vehicle-classes]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../../components/parameters/XTenantId.yaml
      - $ref: ../../components/parameters/XAppId.yaml
      - $ref: ../../components/parameters/XTimestamp.yaml
      - $ref: ../../components/parameters/XNonce.yaml
      - $ref: ../../components/parameters/XSignature.yaml
      - $ref: ../../components/parameters/XApiVersion.yaml
    responses:
      '204':
        description: Class deleted.
      '401':
        $ref: ../../components/responses/Unauthorized.yaml
      '403':
        $ref: ../../components/responses/Forbidden.yaml
      '404':
        $ref: ../../components/responses/NotFound.yaml
