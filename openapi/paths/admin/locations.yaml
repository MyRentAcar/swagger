              type:
                type: string
                enum: [airport, office, hotel, station, custom]
              iata_code:
                type: [string, "null"]
                minLength: 3
                maxLength: 3
              address:
                oneOf:
                  - $ref: ../../components/schemas/I18nString.yaml
                  - type: 'null'
              city:
                type: string
              country_code:
                type: string
                minLength: 2
                maxLength: 2
              latitude:
                type: [number, "null"]
              longitude:
                type: [number, "null"]
              phone:
                type: [string, "null"]
              email:
                type: [string, "null"]
                format: email
              working_hours:
                type: [object, "null"]
                additionalProperties:
                  type: array
                  items:
                    type: string
                    pattern: ^\d{2}:\d{2}-\d{2}:\d{2}$
              meet_greet_fee:
                type: number
                format: double
                minimum: 0
              is_active:
                type: boolean
              display_order:
                type: integer
                minimum: 0
    responses:
      '200':
        description: Location updated.
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: ../../components/schemas/Location.yaml
      '400':
        $ref: ../../components/responses/BadRequest.yaml
      '401':
        $ref: ../../components/responses/Unauthorized.yaml
      '403':
        $ref: ../../components/responses/Forbidden.yaml
      '404':
