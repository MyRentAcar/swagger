collection:
  get:
    operationId: admin.pricingRules.list
    summary: List pricing rules (admin)
    description: |
      Paginated list of `pricing_rules` rows for the active tenant.
      Cursor pagination uses the numeric primary key
      (`?cursor=<last-id>`); the server caps `limit` at 100.
      Authorisation goes through the `PricingRule` policy
      (`viewAny`).
    tags: [admin-pricing-rules]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../../components/parameters/XTenantId.yaml
      - $ref: ../../components/parameters/XAppId.yaml
      - $ref: ../../components/parameters/XTimestamp.yaml
      - $ref: ../../components/parameters/XNonce.yaml
      - $ref: ../../components/parameters/XSignature.yaml
      - $ref: ../../components/parameters/XApiVersion.yaml
      - in: query
        name: cursor
        required: false
        description: Numeric cursor — primary key of the last row of the previous page.
        schema:
          type: integer
          format: int64
          minimum: 1
      - in: query
        name: limit
        required: false
        description: Page size (server-capped at 100).
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - in: query
        name: vehicle_id
        required: false
        description: Filter by vehicle id (vehicle-scoped rules).
        schema:
          type: integer
          format: int64
          minimum: 1
      - in: query
        name: vehicle_class_id
        required: false
        description: Filter by vehicle class id (class-scoped rules).
        schema:
          type: integer
          format: int64
          minimum: 1
      - in: query
        name: is_active
        required: false
        description: Filter by active flag.
        schema:
          type: boolean
    responses:
      '200':
        description: Page of pricing rules.
        content:
          application/json:
            schema:
              type: object
              required: [data, meta]
              properties:
                data:
                  type: array
                  items:
                    $ref: ../../components/schemas/PricingRule.yaml
                meta:
                  type: object
                  properties:
                    pagination:
                      $ref: ../../components/schemas/PaginationMeta.yaml
      '401':
        $ref: ../../components/responses/Unauthorized.yaml
      '403':
        $ref: ../../components/responses/Forbidden.yaml
      '422':
        $ref: ../../components/responses/UnprocessableEntity.yaml

  post:
    operationId: admin.pricingRules.create
    summary: Create a pricing rule (admin)
    description: |
      Creates a `pricing_rules` row. Setting both `vehicle_id` and
      `vehicle_class_id` is allowed but the resolution engine treats
      `vehicle_id` as the more specific scope.
    tags: [admin-pricing-rules]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../../components/parameters/XTenantId.yaml
      - $ref: ../../components/parameters/XAppId.yaml
      - $ref: ../../components/parameters/XTimestamp.yaml
      - $ref: ../../components/parameters/XNonce.yaml
      - $ref: ../../components/parameters/XSignature.yaml
      - $ref: ../../components/parameters/XApiVersion.yaml
      - $ref: ../../components/parameters/IdempotencyKey.yaml
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name]
            properties:
              vehicle_id:
                type: [integer, "null"]
                format: int64
              vehicle_class_id:
                type: [integer, "null"]
                format: int64
              name:
                type: string
                maxLength: 160
              priority:
                type: integer
              valid_from:
                type: [string, "null"]
                format: date
              valid_to:
                type: [string, "null"]
                format: date
              applicable_pickup_locations:
                type: [array, "null"]
                items:
                  type: integer
                  format: int64
              applicable_dropoff_locations:
                type: [array, "null"]
                items:
                  type: integer
                  format: int64
              weekday_mask:
                type: integer
                minimum: 0
                maximum: 127
              min_rental_days:
                type: integer
                minimum: 1
                maximum: 365
              max_rental_days:
                type: [integer, "null"]
                minimum: 1
                maximum: 3650
              daily_rate:
                type: [number, "null"]
                format: double
                minimum: 0
              weekly_rate:
                type: [number, "null"]
                format: double
                minimum: 0
              monthly_rate:
                type: [number, "null"]
                format: double
                minimum: 0
              currency:
                type: string
                minLength: 3
                maxLength: 3
              extras:
                type: [object, "null"]
                additionalProperties: true
              is_active:
                type: boolean
    responses:
      '201':
        description: Pricing rule created.
        headers:
          Location:
            description: Canonical URI of the newly created resource.
            schema:
              type: string
              format: uri
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: ../../components/schemas/PricingRule.yaml
      '400':
        $ref: ../../components/responses/BadRequest.yaml
      '401':
        $ref: ../../components/responses/Unauthorized.yaml
      '403':
        $ref: ../../components/responses/Forbidden.yaml
      '422':
        $ref: ../../components/responses/UnprocessableEntity.yaml

