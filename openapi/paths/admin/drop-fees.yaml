collection:
  get:
    operationId: admin.dropFees.list
    summary: List drop fees (admin)
    description: |
      Paginated list of `drop_fees` rows for the active tenant. Cursor
      pagination uses the numeric primary key (`?cursor=<last-id>`);
      the server caps `limit` at 100. Authorisation goes through the
      `DropFee` policy (`viewAny`).
    tags: [admin-drop-fees]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../../components/parameters/XTenantId.yaml
      - $ref: ../../components/parameters/XAppId.yaml
      - $ref: ../../components/parameters/XTimestamp.yaml
      - $ref: ../../components/parameters/XNonce.yaml
      - $ref: ../../components/parameters/XSignature.yaml
      - $ref: ../../components/parameters/XApiVersion.yaml
      - in: query
        name: cursor
        required: false
        description: Numeric cursor — primary key of the last row of the previous page.
        schema:
          type: integer
          format: int64
          minimum: 1
      - in: query
        name: limit
        required: false
        description: Page size (server-capped at 100).
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - in: query
        name: pickup_location_id
        required: false
        description: Filter by pickup location id.
        schema:
          type: integer
          format: int64
          minimum: 1
      - in: query
        name: dropoff_location_id
        required: false
        description: Filter by drop-off location id.
        schema:
          type: integer
          format: int64
          minimum: 1
      - in: query
        name: vehicle_id
        required: false
        description: Filter by vehicle id (`null` rows can be matched with a separate `is_default=true` filter — TBD).
        schema:
          type: integer
          format: int64
          minimum: 1
      - in: query
        name: is_active
        required: false
        description: Filter by active flag.
        schema:
          type: boolean
    responses:
      '200':
        description: Page of drop fees.
        content:
          application/json:
            schema:
              type: object
              required: [data, meta]
              properties:
                data:
                  type: array
                  items:
                    $ref: ../../components/schemas/DropFee.yaml
                meta:
                  type: object
                  properties:
                    pagination:
                      $ref: ../../components/schemas/PaginationMeta.yaml
      '401':
        $ref: ../../components/responses/Unauthorized.yaml
      '403':
        $ref: ../../components/responses/Forbidden.yaml
      '422':
        $ref: ../../components/responses/UnprocessableEntity.yaml

  post:
    operationId: admin.dropFees.create
    summary: Create a drop fee (admin)
    description: |
      Creates a `drop_fees` row. `pickup_location_id` must differ from
      `dropoff_location_id`. When `vehicle_id` is omitted/null the row
      applies to all vehicles in the tenant fleet.
    tags: [admin-drop-fees]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../../components/parameters/XTenantId.yaml
      - $ref: ../../components/parameters/XAppId.yaml
      - $ref: ../../components/parameters/XTimestamp.yaml
      - $ref: ../../components/parameters/XNonce.yaml
      - $ref: ../../components/parameters/XSignature.yaml
      - $ref: ../../components/parameters/XApiVersion.yaml
      - $ref: ../../components/parameters/IdempotencyKey.yaml
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [pickup_location_id, dropoff_location_id, fee]
            properties:
              pickup_location_id:
                type: integer
                format: int64
                minimum: 1
              dropoff_location_id:
                type: integer
                format: int64
                minimum: 1
              vehicle_id:
                type: [integer, "null"]
                format: int64
                minimum: 1
              fee:
                type: number
                format: double
                minimum: 0
              currency:
                type: string
                minLength: 3
                maxLength: 3
                pattern: ^[A-Z]{3}$
              is_active:
                type: boolean
    responses:
      '201':
        description: Drop fee created.
        headers:
          Location:
            description: Canonical URI of the newly created resource.
            schema:
              type: string
              format: uri
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: ../../components/schemas/DropFee.yaml
      '400':
        $ref: ../../components/responses/BadRequest.yaml
      '401':
        $ref: ../../components/responses/Unauthorized.yaml
      '403':
        $ref: ../../components/responses/Forbidden.yaml
      '422':
        $ref: ../../components/responses/UnprocessableEntity.yaml

byId:
  parameters:
    - $ref: ../../components/parameters/IdParam.yaml
  get:
    operationId: admin.dropFees.show
    summary: Get a drop fee (admin)
    description: Returns the drop fee. Cross-tenant ids return `404`.
    tags: [admin-drop-fees]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../../components/parameters/XTenantId.yaml
      - $ref: ../../components/parameters/XAppId.yaml
      - $ref: ../../components/parameters/XTimestamp.yaml
      - $ref: ../../components/parameters/XNonce.yaml
      - $ref: ../../components/parameters/XSignature.yaml
      - $ref: ../../components/parameters/XApiVersion.yaml
    responses:
      '200':
        description: Drop fee detail.
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: ../../components/schemas/DropFee.yaml
      '401':
        $ref: ../../components/responses/Unauthorized.yaml
      '403':
        $ref: ../../components/responses/Forbidden.yaml
      '404':
        $ref: ../../components/responses/NotFound.yaml

  put:
    operationId: admin.dropFees.update
    summary: Update a drop fee (admin)
    description: |
      Replaces the writable fields on a `drop_fees` row. The payload
      follows the FormRequest `sometimes` convention.
    tags: [admin-drop-fees]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../../components/parameters/XTenantId.yaml
      - $ref: ../../components/parameters/XAppId.yaml
      - $ref: ../../components/parameters/XTimestamp.yaml
      - $ref: ../../components/parameters/XNonce.yaml
      - $ref: ../../components/parameters/XSignature.yaml
      - $ref: ../../components/parameters/XApiVersion.yaml
      - $ref: ../../components/parameters/IdempotencyKey.yaml
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              pickup_location_id:
                type: integer
                format: int64
              dropoff_location_id:
                type: integer
                format: int64
              vehicle_id:
                type: [integer, "null"]
                format: int64
              fee:
                type: number
                format: double
                minimum: 0
              currency:
                type: string
                minLength: 3
                maxLength: 3
              is_active:
                type: boolean
    responses:
      '200':
        description: Drop fee updated.
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: ../../components/schemas/DropFee.yaml
      '400':
        $ref: ../../components/responses/BadRequest.yaml
      '401':
        $ref: ../../components/responses/Unauthorized.yaml
      '403':
        $ref: ../../components/responses/Forbidden.yaml
      '404':
        $ref: ../../components/responses/NotFound.yaml
      '422':
        $ref: ../../components/responses/UnprocessableEntity.yaml

  delete:
    operationId: admin.dropFees.delete
    summary: Delete a drop fee (admin)
    description: Soft-deletes the drop fee. Cross-tenant ids return `404`.
    tags: [admin-drop-fees]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../../components/parameters/XTenantId.yaml
      - $ref: ../../components/parameters/XAppId.yaml
      - $ref: ../../components/parameters/XTimestamp.yaml
      - $ref: ../../components/parameters/XNonce.yaml
      - $ref: ../../components/parameters/XSignature.yaml
      - $ref: ../../components/parameters/XApiVersion.yaml
    responses:
      '204':
        description: Drop fee deleted.
      '401':
        $ref: ../../components/responses/Unauthorized.yaml
      '403':
        $ref: ../../components/responses/Forbidden.yaml
      '404':
        $ref: ../../components/responses/NotFound.yaml
