collection:
  get:
    operationId: reservations.list
    summary: List reservations belonging to the authenticated user
    description: |
      Returns the authenticated user's reservations across the active
      tenant. B2B partners see only the reservations created via
      their own bearer token (`reservations.b2b_partner_id` filter).
      Storage totals are emitted in `quote_currency`; if the request
      carries `X-Display-Currency` the engine attaches a per-row
      conversion using the latest active rate.
    tags: [Reservations]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../components/parameters/XTenantId.yaml
      - $ref: ../components/parameters/XAppId.yaml
      - $ref: ../components/parameters/XTimestamp.yaml
      - $ref: ../components/parameters/XNonce.yaml
      - $ref: ../components/parameters/XSignature.yaml
      - $ref: ../components/parameters/XApiVersion.yaml
      - $ref: ../components/parameters/XDisplayCurrency.yaml
      - $ref: ../components/parameters/AcceptLanguage.yaml
      - $ref: ../components/parameters/PaginationCursor.yaml
      - $ref: ../components/parameters/PaginationLimit.yaml
      - in: query
        name: status
        required: false
        description: Filter by reservation status.
        schema:
          type: string
          enum: [pending, confirmed, picked_up, returned, cancelled, no_show]
      - $ref: ../components/parameters/BranchIdQuery.yaml
    responses:
      '200':
        description: Reservation page.
        content:
          application/json:
            schema:
              type: object
              required: [data, meta]
              properties:
                data:
                  type: array
                  items:
                    $ref: ../components/schemas/Reservation.yaml
                meta:
                  type: object
                  properties:
                    pagination:
                      $ref: ../components/schemas/PaginationMeta.yaml
      '401':
        $ref: ../components/responses/Unauthorized.yaml

  post:
    operationId: reservations.create
    summary: Create a reservation
    description: |
      Creates a reservation for the authenticated end-user. The
      `Idempotency-Key` header is required: a retry with the same
      key and identical body returns the cached response (24h
      window). The server recomputes the `PricingQuote` from
      `vehicle_id` + window + locations on accept; if the recomputed
      total differs from the offer the customer last saw the
      response is `409 Conflict` and the client must re-quote. The
      authenticated `customer` upsert is keyed on
      `(tenant_id, email)`.
    tags: [Reservations]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../components/parameters/XTenantId.yaml
      - $ref: ../components/parameters/XAppId.yaml
      - $ref: ../components/parameters/XTimestamp.yaml
      - $ref: ../components/parameters/XNonce.yaml
      - $ref: ../components/parameters/XSignature.yaml
      - $ref: ../components/parameters/XApiVersion.yaml
      - $ref: ../components/parameters/XDisplayCurrency.yaml
      - $ref: ../components/parameters/AcceptLanguage.yaml
      - name: Idempotency-Key
        in: header
        required: true
        description: |
          Client-generated ULID. Required for write operations on
          the `write` rate-limit tier. See common parameter
          `IdempotencyKey` for full semantics.
        schema:
          type: string
          pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ReservationCreateRequest.yaml
    responses:
      '201':
        description: Reservation created.
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: ../components/schemas/Reservation.yaml
      '400':
        $ref: ../components/responses/BadRequest.yaml
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '409':
        description: |
          Conflict — the requested vehicle/window is no longer
          available (price changed, stop-sale activated, plates
          exhausted) or the idempotency key has been reused with a
          different body hash.
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/Error.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
      '429':
        $ref: ../components/responses/TooManyRequests.yaml

byId:
  parameters:
    - in: path
      name: reservation_number
      required: true
      description: |
        Public reservation number (e.g. `RNT-2026-001234`). Tenant
        scope is implicit from `X-Tenant-ID`.
      schema:
        type: string
        pattern: ^RNT-\d{4}-\d{6}$
  get:
    operationId: reservations.show
    summary: Get a reservation by reservation_number
    description: |
      Returns the reservation if it belongs to the authenticated
      user (B2C) or to the partner that issued the bearer token
      (B2B). Cross-tenant or cross-owner reads return `404`.
    tags: [Reservations]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../components/parameters/XTenantId.yaml
      - $ref: ../components/parameters/XAppId.yaml
      - $ref: ../components/parameters/XTimestamp.yaml
      - $ref: ../components/parameters/XNonce.yaml
      - $ref: ../components/parameters/XSignature.yaml
      - $ref: ../components/parameters/XApiVersion.yaml
      - $ref: ../components/parameters/XDisplayCurrency.yaml
      - $ref: ../components/parameters/AcceptLanguage.yaml
    responses:
      '200':
        description: Reservation detail.
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: ../components/schemas/Reservation.yaml
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml

cancel:
  parameters:
    - in: path
      name: reservation_number
      required: true
      description: Public reservation number (e.g. `RNT-2026-001234`).
      schema:
        type: string
        pattern: ^RNT-\d{4}-\d{6}$
  patch:
    operationId: reservations.cancel
    summary: Cancel a reservation
    description: |
      Transitions an eligible reservation to `cancelled`. The
      cancellation policy and refund/fee computation will land in
      Sprint 1.7 — this Sprint 1.5 endpoint accepts the cancel
      request and flips `status = cancelled`, `cancelled_at = now()`,
      and stores the customer-supplied `reason` on
      `cancellation_reason`. Already cancelled reservations return
      `409`.
    tags: [Reservations]
    security:
      - hmacAuth: []
        sanctumBearer: []
    parameters:
      - $ref: ../components/parameters/XTenantId.yaml
      - $ref: ../components/parameters/XAppId.yaml
      - $ref: ../components/parameters/XTimestamp.yaml
      - $ref: ../components/parameters/XNonce.yaml
      - $ref: ../components/parameters/XSignature.yaml
      - $ref: ../components/parameters/XApiVersion.yaml
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [reason]
            properties:
              reason:
                type: string
                minLength: 1
                maxLength: 1000
                description: Customer-supplied free-text cancellation reason.
                example: Travel plans changed.
    responses:
      '200':
        description: Cancellation accepted.
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: ../components/schemas/Reservation.yaml
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
      '409':
        description: Reservation cannot be cancelled in its current state.
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas/Error.yaml
